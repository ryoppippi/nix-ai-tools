name: Lint package definitions
on:
  pull_request:
    paths:
      - 'packages/**'
      - 'rules/**'
      - 'sgconfig.yml'
      - 'checks/ast-grep.nix'
      - '.github/workflows/lint.yml'
permissions:
  contents: read
jobs:
  ast-grep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Nix
        uses: cachix/install-nix-action@v31
      - name: Run ast-grep lint rules
        run: nix build --print-build-logs '.#checks.x86_64-linux.ast-grep'
